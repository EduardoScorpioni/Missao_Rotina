<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Missão Rotina</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="feedback-toast" id="toast"></div>

  <!-- TELA DE CONCLUSÃO DE FASE -->
  <div class="phase-complete-overlay" id="phaseCompleteOverlay">
    <div class="phase-complete-card">
      <div class="pc-phase-icon" id="pcPhaseIcon">🌅</div>
      <h2 class="pc-title" id="pcTitle">Fase Concluída!</h2>
      <div class="pc-stars-wrap" id="pcStarsWrap">
        <!-- estrelas animadas inseridas pelo JS -->
      </div>
      <div class="pc-score-line" id="pcScoreLine">+20 pontos</div>
      <div class="pc-details" id="pcDetails">
        <!-- detalhes de bônus e penalidades -->
      </div>
      <button class="pc-btn-next" id="pcBtnNext" onclick="advancePhase()">
        Próxima Fase ➡️
      </button>
    </div>
  </div>

  <div class="game-root">

    <!-- HEADER -->
    <div class="header">
      <div class="logo-area">
        <div class="logo-icon">🚀</div>
        <div class="logo-text">
          <h1>Missão Rotina</h1>
          <p>Aprenda sequências</p>
        </div>
      </div>
      <div class="score-box">
        <div class="label">Pontos</div>
        <div class="value" id="scoreVal">0</div>
        <div class="stars-row" id="starsRow">
          <!-- estrelas geradas dinamicamente pelo JS -->
        </div>
      </div>
    </div>

    <!-- FASES -->
    <div class="phase-nav" id="phaseNav"></div>

    <!-- JOGO -->
    <div class="game-area">

      <!-- Painel esquerdo: botões de ação -->
      <div class="left-panel actions-panel">
        <div class="char-wrap char-wrap-vertical">
          <div class="char">🧒</div>
          <div class="char-speech char-speech-vertical" id="charSpeech">Vamos lá!</div>
        </div>
        <button class="btn-action btn-check"     onclick="checkAnswer()">✅ Verificar!</button>
        <button class="btn-action btn-speak-all" onclick="speakSequence()">🎧 Ouvir</button>
        <button class="btn-action btn-hint"      onclick="showHint()">💡 Dica</button>
        <button class="btn-action btn-reset"     onclick="resetPhase()">🔄 Recomeçar</button>
      </div>

      <!-- Painel direito: missão + sequência -->
      <div class="right-panel">
        <div class="mission-header" id="missionHeader">
          <div class="big-icon" id="missionIcon">🌅</div>
          <div style="flex:1">
            <h2 id="missionTitle">Fase 1 — Começar o Dia!</h2>
            <p id="missionDesc">Arraste os blocos na ordem certa para ir à escola</p>
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
            </div>
          </div>
          <button class="speak-btn" id="speakMissionBtn" onclick="speakMission()" title="Ouvir a missão">🔊</button>
        </div>

        <div class="seq-title">📋 Monte a sequência:</div>
        <div class="drop-zone" id="dropZone"></div>
      </div>

    </div>

    <!-- PAINEL INFERIOR: blocos -->
    <div class="bottom-blocks-panel">
      <div class="panel-title">🎴 Blocos</div>
      <div id="blockList"></div>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
